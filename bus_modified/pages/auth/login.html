<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        * { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(10,22,40,0.95); }
        .dark input { background: #0f2942; border-color: #1a3a5c; color: #e2e8f0; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-[#0a1628] min-h-screen flex items-center justify-center p-4" onload="initDarkMode()">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="../../index.html" class="inline-flex items-center gap-3 mb-6 cursor-pointer">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-4 0-8 .5-8 4v9.5C4 17.43 5.57 19 7.5 19L6 20.5v.5h12v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V6c0-3.5-4-4-8-4zM7.5 17c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm3.5-6H6V6h5v5zm2 0V6h5v5h-5zm3.5 6c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                </div>
                <span class="brand-text text-2xl font-bold text-gray-800 dark:text-white">BUS</span>
            </a>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white" data-i18n="login">Connexion</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2" data-i18n="loginInfo">Accédez à votre espace</p>
        </div>
        
        <div class="glass rounded-2xl shadow-2xl p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="votre@email.dz" autocomplete="username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Mot de passe</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <label for="remember" class="ml-2 text-sm text-gray-600 dark:text-gray-400">Se souvenir de moi</label>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition">Se connecter</button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">Pas de compte ? <a href="register.html" class="text-blue-600 hover:underline">S'inscrire</a></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/popup.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script>
        const API_URL = '../../backend/';
        
        function initDarkMode() {
            if (localStorage.getItem('dark') === 'true') {
                document.documentElement.classList.add('dark');
            }
        }
        initDarkMode();
        
        let tempUserId = null;
        let pendingRole = null;
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember')?.checked || false;
            
            if (!email || !password) {
                showPopup('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            try {
                console.log('Tentative de connexion avec:', email);
                const res = await fetch(API_URL + 'login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('Réponse HTTP:', res.status, res.statusText);
                const data = await res.json();
                console.log('Données reçues:', data);
                
                if (data.success) {
                    if (data.require_2fa) {
                        tempUserId = data.user_id;
                        pendingRole = data.user?.role;
                        show2FAStep(data.debug_code);
                    } else if (data.user) {
                        if (data.warning) {
                            // Chauffeur sans bus : connecter quand même mais afficher l'avertissement
                            showPopup(data.warning, 'error');
                            setTimeout(() => connectUser(data.user, remember), 2500);
                        } else {
                            connectUser(data.user, remember);
                        }
                    } else {
                        showPopup('Erreur: réponse invalide du serveur', 'error');
                    }
                } else {
                    showPopup(data.message || 'Erreur de connexion', 'error');
                }
            } catch (err) {
                console.error('Erreur lors de la requête:', err);
                showPopup('Erreur de connexion au serveur', 'error');
            }
        });
        
        function connectUser(user, remember) {
            localStorage.setItem('user', JSON.stringify(user));
            if (user.photo) {
                localStorage.setItem('userPhoto', user.photo);
            }
            localStorage.setItem('remember', remember ? 'true' : 'false');
            showPopup('Connexion réussie!', 'success');
            
            setTimeout(() => {
                if (user.role === 'admin') {
                    window.location.href = '../admin/dashboard.html';
                } else if (user.role === 'chauffeur') {
                    window.location.href = '../chauffeur/dashboard.html';
                } else {
                    window.location.href = '../etudiant/dashboard.html';
                }
            }, 1000);
        }
        
        function show2FAStep(debugCode) {
            const form = document.getElementById('loginForm');
            form.classList.add('hidden');
            
            let container = document.getElementById('2faContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = '2faContainer';
                container.className = 'glass rounded-2xl shadow-2xl p-8';
                container.innerHTML = `
                    <div class="text-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-2">Vérification</h2>
                        <p class="text-gray-500 text-sm">Code envoyé à votre email</p>
                    </div>
                    <form id="verifyForm" class="space-y-5">
                        <input type="text" id="verifyCode" required maxlength="6" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl text-center text-2xl tracking-widest" placeholder="000000">
                        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700">Vérifier</button>
                        <button type="button" onclick="backToLogin()" class="w-full py-2 text-gray-500 text-sm">Retour</button>
                    </form>
                `;
                form.parentNode.insertBefore(container, form.nextSibling);
            }
            
            if (debugCode) {
                const debugDiv = document.createElement('div');
                debugDiv.className = 'mt-3 p-2 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-200 text-center text-sm rounded-lg';
                debugDiv.innerHTML = `Code: <strong>${debugCode}</strong>`;
                container.appendChild(debugDiv);
            }
            
            document.getElementById('verifyForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const code = document.getElementById('verifyCode').value.trim();
                const remember = document.getElementById('remember')?.checked || false;
                
                try {
                    const res = await fetch(API_URL + 'verify_code.php?action=verify_code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: tempUserId, code })
                    });
                    
                    const data = await res.json();
                    
                    if (data.success && data.user) {
                        connectUser(data.user, remember);
                    } else {
                        showPopup(data.message || 'Code invalide', 'error');
                    }
                } catch (err) {
                    showPopup('Erreur de vérification', 'error');
                }
            });
        }
        
        function backToLogin() {
            const form = document.getElementById('loginForm');
            if (form) form.classList.remove('hidden');
            const container = document.getElementById('2faContainer');
            if (container) container.remove();
            tempUserId = null;
            pendingRole = null;
        }
    </script>
</body>
</html>
